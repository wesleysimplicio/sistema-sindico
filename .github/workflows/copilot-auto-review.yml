name: Copilot auto review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  request-copilot-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # GitHub Copilot Code Review uses login "copilot-pull-request-reviewer"
          # API requires the bot to be assignable; fallback to copilot-swe-agent / Copilot
          for reviewer in copilot-pull-request-reviewer copilot-swe-agent Copilot; do
            if gh api -X POST \
                -H "Accept: application/vnd.github+json" \
                "repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
                -f "reviewers[]=${reviewer}" >/dev/null 2>&1; then
              echo "Requested review from ${reviewer}"
              exit 0
            fi
          done
          echo "::warning::Could not auto-request Copilot reviewer. Enable Copilot code review in repo settings: Settings > Code & automation > Code review > Copilot code review."
