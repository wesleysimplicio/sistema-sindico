name: Deploy to HostGator (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostgator
  cancel-in-progress: false

jobs:
  deploy:
    name: Build release and upload via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up PHP 8.2 (compatible with HostGator ea-php82+)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: PHP syntax lint
        run: |
          set -euo pipefail
          find src public routes templates -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l > /tmp/lint.log 2>&1 || (cat /tmp/lint.log && exit 1)
          echo "lint OK"

      - name: Build HostGator release
        run: bash scripts/build-hostgator-release.sh

      - name: Verify HostGator release
        run: bash scripts/verify-hostgator-release.sh

      - name: Show manifest preview
        run: |
          echo "----- manifest -----"
          head -60 .deploy-build/hostgator-release.manifest.txt || true
          echo "----- file count -----"
          find .deploy-build/hostgator-release -type f | wc -l

      - name: Upload to HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./.deploy-build/hostgator-release/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/.env
            **/.env.*

      - name: Purge Cloudflare cache
        if: success() && env.CF_TOKEN != '' && env.CF_ZONE != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          response="$(curl -fsSL -X POST \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache")"
          echo "${response}"
          echo "${response}" | grep -q '"success":true' || {
            echo "::error::Cloudflare purge failed"
            exit 1
          }
