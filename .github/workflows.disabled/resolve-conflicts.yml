name: Resolve PR Conflicts

on:
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    if: >
      (github.event_name == 'pull_request_target' && github.event.label.name == 'resolve-conflicts') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/resolve-conflicts'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            PR_NUMBER="${{ github.event.issue.number }}"
          fi
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName,baseRefName,headRepository,headRepositoryOwner,maintainerCanModify,isCrossRepository)
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON" | jq -r .headRefName)" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$PR_JSON" | jq -r .baseRefName)" >> "$GITHUB_OUTPUT"
          echo "is_cross=$(echo "$PR_JSON" | jq -r .isCrossRepository)" >> "$GITHUB_OUTPUT"
          echo "maintainer_can_modify=$(echo "$PR_JSON" | jq -r .maintainerCanModify)" >> "$GITHUB_OUTPUT"

      - name: Block cross-repo PRs without maintainer modify
        if: steps.pr.outputs.is_cross == 'true' && steps.pr.outputs.maintainer_can_modify != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.pr_number }}" --repo "$GITHUB_REPOSITORY" --body "Cannot resolve conflicts: PR is from a fork and 'Allow edits by maintainers' is disabled. Enable it on the PR or resolve the conflicts locally."
          exit 1

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Attempt automatic merge of base into PR
        id: merge
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set +e
          git fetch origin "$BASE_REF"
          git merge --no-edit "origin/$BASE_REF"
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CONFLICTS=$(git diff --name-only --diff-filter=U || true)
          {
            echo "result=conflict"
            echo "conflicts<<EOF"
            echo "$CONFLICTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          git merge --abort || true

      - name: Push merge commit
        if: steps.merge.outputs.result == 'clean'
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: git push origin "HEAD:$HEAD_REF"

      - name: Comment success
        if: steps.merge.outputs.result == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          gh pr comment "${{ steps.pr.outputs.pr_number }}" --repo "$GITHUB_REPOSITORY" --body "Conflicts resolved automatically. Merged \`$BASE_REF\` into this PR. Please review the merge commit before merging."

      - name: Comment conflict report
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        run: |
          BODY=$(cat <<EOF
          Automatic conflict resolution failed. Manual intervention required.

          **Conflicting files:**
          \`\`\`
          $CONFLICTS
          \`\`\`

          **How to resolve locally:**
          \`\`\`bash
          git fetch origin
          git checkout $HEAD_REF
          git merge origin/$BASE_REF
          # resolve conflicts in editor, then:
          git add .
          git commit
          git push origin $HEAD_REF
          \`\`\`

          After pushing, this PR will update. Re-trigger this workflow with the \`resolve-conflicts\` label or comment \`/resolve-conflicts\` if needed.
          EOF
          )
          gh pr comment "${{ steps.pr.outputs.pr_number }}" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          exit 1
