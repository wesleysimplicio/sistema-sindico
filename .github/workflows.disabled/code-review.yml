name: Code Review (Claude AI + static analysis)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude AI review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if ANTHROPIC_API_KEY missing
        id: gate
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set; skipping Claude review."
            echo "Configure in Settings -> Secrets and variables -> Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect PR diff
        if: steps.gate.outputs.skip == 'false'
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=50 origin "$BASE_SHA" "$HEAD_SHA" || true
          # Limit diff to 200KB to stay under token budget
          git diff --no-color "$BASE_SHA"..."$HEAD_SHA" -- \
            ':(exclude).deploy-build/**' \
            ':(exclude)**/*.lock' \
            ':(exclude)**/*.min.*' \
            ':(exclude)**/dist/**' \
            ':(exclude)**/build/**' \
            ':(exclude)**/vendor/**' \
            ':(exclude)**/node_modules/**' \
            > /tmp/pr.diff || true
          size=$(wc -c < /tmp/pr.diff || echo 0)
          echo "diff size: $size bytes"
          if [ "$size" -gt 200000 ]; then
            head -c 200000 /tmp/pr.diff > /tmp/pr.diff.trunc
            mv /tmp/pr.diff.trunc /tmp/pr.diff
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Call Claude API for review
        if: steps.gate.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys, urllib.request

          diff = open('/tmp/pr.diff').read() if os.path.exists('/tmp/pr.diff') else ''
          if not diff.strip():
              open('/tmp/review.md','w').write('_No diff to review._')
              sys.exit(0)

          system = (
            "You are a senior PHP/JS code reviewer for a SaaS project (sistema-sindico). "
            "Review the unified diff and report ONLY actionable issues grouped by severity. "
            "Focus on: bugs, security (SQLi, XSS, CSRF, auth, secrets, path traversal), "
            "PHP 8.x correctness, error handling, performance hot paths, and code clarity. "
            "Skip nitpicks. If nothing is wrong, say 'No blocking issues found.'. "
            "Respond in Portuguese (pt-BR), markdown, with sections: "
            "**🔴 Bloqueante**, **🟡 Atenção**, **🟢 Sugestão**. "
            "Reference file:line when possible. Be concise."
          )
          user = (
            f"Título do PR: {os.environ.get('PR_TITLE','')}\n"
            f"Descrição: {os.environ.get('PR_BODY','') or '(vazia)'}\n"
            f"Diff truncado: {os.environ.get('TRUNCATED','false')}\n\n"
            f"```diff\n{diff}\n```"
          )
          payload = {
            "model": "claude-sonnet-4-6",
            "max_tokens": 2500,
            "system": system,
            "messages": [{"role": "user", "content": user}],
          }
          req = urllib.request.Request(
            "https://api.anthropic.com/v1/messages",
            data=json.dumps(payload).encode(),
            headers={
              "x-api-key": os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01",
              "content-type": "application/json",
            },
          )
          try:
            with urllib.request.urlopen(req, timeout=120) as r:
              data = json.loads(r.read())
            text = "".join(b.get("text","") for b in data.get("content",[]) if b.get("type")=="text")
          except Exception as e:
            text = f"_Claude review failed: {e}_"
          open('/tmp/review.md','w').write(text or "_empty response_")
          PY

      - name: Post review comment
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
        run: |
          set -euo pipefail
          {
            echo "## 🤖 Claude AI Code Review"
            echo
            if [ "${TRUNCATED}" = "true" ]; then
              echo "> ⚠️ Diff truncado em 200KB para caber no contexto. Revisão parcial."
              echo
            fi
            cat /tmp/review.md
            echo
            echo "---"
            echo "_Modelo: claude-sonnet-4-6 · gerado por \`.github/workflows/code-review.yml\`_"
          } > /tmp/comment.md
          gh pr comment "$PR" --repo "$REPO" --body-file /tmp/comment.md

  static-review:
    name: Static review (reviewdog)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2, phpcs, phpstan

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: PHP -l (changed files) via reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=50 origin "$BASE_SHA" "$HEAD_SHA" || true
          mapfile -t files < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA"..."$HEAD_SHA" -- '*.php' || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no PHP files changed"
            exit 0
          fi
          : > /tmp/lint.txt
          for f in "${files[@]}"; do
            [ -f "$f" ] || continue
            php -l "$f" 2>&1 | grep -vE '^No syntax errors' >> /tmp/lint.txt || true
          done
          if [ -s /tmp/lint.txt ]; then
            cat /tmp/lint.txt
            cat /tmp/lint.txt | reviewdog \
              -efm='%tarse error: %m in %f on line %l' \
              -efm='%tarse error: %f line %l: %m' \
              -name='php -l' \
              -reporter=github-pr-review \
              -fail-on-error=true || exit 1
          else
            echo "PHP lint clean on changed files"
          fi

      - name: PHPStan (if configured)
        if: hashFiles('phpstan.neon*') != ''
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer install --no-interaction --prefer-dist --no-progress || true
          (vendor/bin/phpstan analyse --no-progress --error-format=raw 2>&1 || true) \
            | reviewdog -f=phpstan -name=phpstan -reporter=github-pr-review -fail-on-error=false

      - name: PHPCS (if configured)
        if: hashFiles('phpcs.xml*') != ''
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer install --no-interaction --prefer-dist --no-progress || true
          (vendor/bin/phpcs --report=checkstyle 2>&1 || true) \
            | reviewdog -f=checkstyle -name=phpcs -reporter=github-pr-review -fail-on-error=false

  security-scan:
    name: Secret + dependency scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
        continue-on-error: true
