services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Sistema Sindico
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: sistema_sindico
      DB_USERNAME: sistema_sindico
      DB_PASSWORD: sistema_sindico
      JWT_SECRET: docker-local-jwt-secret-please-change-1234567890
    ports:
      - "8000:80"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sistema_sindico
      MYSQL_USER: sistema_sindico
      MYSQL_PASSWORD: sistema_sindico
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-bootstrap/database:ro
      - ./docker/mysql/10-bootstrap.sh:/docker-entrypoint-initdb.d/10-bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  db_data:
